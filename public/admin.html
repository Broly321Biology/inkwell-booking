<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INKWELL — Studio Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #080808;
    --deep: #0e0b0b;
    --surface: #131010;
    --surface2: #1c1717;
    --border: #2a2020;
    --red: #8b1a1a;
    --red-bright: #c0392b;
    --red-glow: #e74c3c;
    --cream: #e8ddd0;
    --muted: #7a6a60;
    --text: #ccc0b4;
    --green: #2d6a4f;
    --green-bright: #52b788;
    --amber: #7a4f1a;
    --amber-bright: #e09040;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--black);
    color: var(--text);
    font-family: 'Cormorant Garamond', Georgia, serif;
    min-height: 100vh;
    cursor: default;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.3;
  }

  /* ── LOGIN ── */
  #loginScreen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
  }

  .login-card {
    width: 100%;
    max-width: 400px;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 48px;
    position: relative;
  }

  .login-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--red), var(--red-glow), var(--red));
  }

  .login-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    color: var(--cream);
    letter-spacing: 0.12em;
    text-align: center;
    margin-bottom: 4px;
    text-shadow: 0 0 40px rgba(139,26,26,0.3);
  }

  .login-sub {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.4em;
    color: var(--muted);
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 40px;
  }

  .login-field {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 20px;
  }

  .login-field label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .login-field input {
    background: var(--deep);
    border: 1px solid var(--border);
    color: var(--cream);
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px;
    padding: 12px 16px;
    outline: none;
    width: 100%;
    transition: border-color 0.2s, box-shadow 0.2s;
    border-radius: 0;
    -webkit-appearance: none;
  }

  .login-field input:focus {
    border-color: var(--red);
    box-shadow: 0 0 0 1px var(--red);
  }

  .login-btn {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 0.4em;
    color: var(--cream);
    background: transparent;
    border: 1px solid var(--red);
    padding: 14px;
    cursor: pointer;
    width: 100%;
    margin-top: 8px;
    position: relative;
    overflow: hidden;
    transition: color 0.3s;
  }

  .login-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--red);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.4s cubic-bezier(0.77,0,0.175,1);
  }

  .login-btn:hover::before { transform: scaleX(1); }
  .login-btn span { position: relative; z-index: 1; }

  .login-error {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--red-glow);
    text-align: center;
    margin-top: 16px;
    display: none;
  }

  /* ── DASHBOARD ── */
  #dashboard { display: none; }

  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .topbar-left {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .topbar-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--cream);
    letter-spacing: 0.15em;
  }

  .topbar-divider {
    width: 1px;
    height: 20px;
    background: var(--border);
  }

  .topbar-title {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.35em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .refresh-btn {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--muted);
    background: none;
    border: 1px solid var(--border);
    padding: 7px 14px;
    cursor: pointer;
    text-transform: uppercase;
    transition: border-color 0.2s, color 0.2s;
  }
  .refresh-btn:hover { border-color: var(--red); color: var(--cream); }

  .logout-btn {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    text-transform: uppercase;
    transition: color 0.2s;
    padding: 7px 0;
  }
  .logout-btn:hover { color: var(--red-glow); }

  /* ── TABS ── */
  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    padding: 0 32px;
  }

  .tab {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: uppercase;
    padding: 14px 20px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.2s, border-color 0.2s;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
  }

  .tab:hover { color: var(--text); }
  .tab.active { color: var(--cream); border-bottom-color: var(--red); }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* ── MAIN CONTENT ── */
  .main { padding: 32px; max-width: 1200px; margin: 0 auto; }

  /* ── STATS ── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 24px;
    position: relative;
    overflow: hidden;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, var(--red), transparent);
  }

  .stat-label {
    font-family: 'Space Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.35em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .stat-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    color: var(--cream);
    line-height: 1;
    letter-spacing: 0.05em;
  }

  .stat-value.red { color: var(--red-glow); }
  .stat-value.green { color: var(--green-bright); }
  .stat-value.amber { color: var(--amber-bright); }

  .stat-sub {
    font-family: 'Space Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.2em;
    color: var(--muted);
    margin-top: 6px;
    text-transform: uppercase;
  }

  /* ── CHARTS ── */
  .charts-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 32px;
  }

  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 24px;
  }

  .chart-title {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.35em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .chart-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── BOOKINGS TABLE ── */
  .table-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    gap: 16px;
    flex-wrap: wrap;
  }

  .table-title {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.35em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .filters {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .filter-btn {
    font-family: 'Space Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 6px 12px;
    border: 1px solid var(--border);
    background: var(--deep);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }

  .filter-btn:hover, .filter-btn.active {
    border-color: var(--red);
    color: var(--cream);
    background: rgba(139,26,26,0.1);
  }

  .bookings-table {
    width: 100%;
    border-collapse: collapse;
    background: var(--surface);
    border: 1px solid var(--border);
  }

  .bookings-table th {
    font-family: 'Space Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: uppercase;
    padding: 12px 16px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    background: var(--deep);
    white-space: nowrap;
  }

  .bookings-table td {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 15px;
    color: var(--text);
    vertical-align: middle;
  }

  .bookings-table tr:last-child td { border-bottom: none; }

  .bookings-table tr {
    cursor: pointer;
    transition: background 0.15s;
  }

  .bookings-table tr:hover td { background: var(--surface2); }

  .status-badge {
    font-family: 'Space Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 4px 10px;
    border: 1px solid;
    white-space: nowrap;
  }

  .status-new       { color: var(--red-glow);    border-color: var(--red);          background: rgba(139,26,26,0.15); }
  .status-reviewed  { color: var(--amber-bright); border-color: var(--amber);        background: rgba(122,79,26,0.15); }
  .status-confirmed { color: var(--green-bright); border-color: var(--green);        background: rgba(45,106,79,0.15); }
  .status-declined  { color: var(--muted);        border-color: var(--border);       background: transparent; }
  .status-completed { color: var(--cream);        border-color: var(--muted);        background: rgba(122,106,96,0.1); }

  /* ── BOOKING DETAIL MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(8,8,8,0.92);
    z-index: 200;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 24px;
    overflow-y: auto;
  }

  .modal-overlay.show { display: flex; animation: fadeIn 0.2s ease; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    width: 100%;
    max-width: 680px;
    position: relative;
    margin: auto;
  }

  .modal::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--red), var(--red-glow), var(--red));
  }

  .modal-header {
    padding: 28px 32px 20px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .modal-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    color: var(--cream);
    letter-spacing: 0.08em;
    line-height: 1;
  }

  .modal-ref {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 4px;
  }

  .modal-close {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 16px;
    width: 32px;
    height: 32px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.2s, color 0.2s;
    flex-shrink: 0;
  }

  .modal-close:hover { border-color: var(--red); color: var(--cream); }

  .modal-body { padding: 24px 32px; }

  .modal-section {
    margin-bottom: 24px;
  }

  .modal-section-title {
    font-family: 'Space Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.4em;
    color: var(--red);
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .modal-section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .modal-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .modal-field label {
    font-family: 'Space Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.25em;
    color: var(--muted);
    text-transform: uppercase;
    display: block;
    margin-bottom: 4px;
  }

  .modal-field p {
    font-size: 16px;
    color: var(--cream);
    line-height: 1.5;
  }

  .modal-field.full { grid-column: 1 / -1; }

  .modal-description {
    font-size: 17px;
    color: var(--cream);
    line-height: 1.7;
    font-style: italic;
    background: var(--deep);
    padding: 16px;
    border-left: 2px solid var(--red);
  }

  .modal-files {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .modal-file-link {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--deep);
    border: 1px solid var(--border);
    color: var(--red-glow);
    text-decoration: none;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    transition: border-color 0.2s;
  }

  .modal-file-link:hover { border-color: var(--red); }

  /* Status actions */
  .status-actions {
    padding: 20px 32px 28px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .status-actions span {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.25em;
    color: var(--muted);
    text-transform: uppercase;
    margin-right: 4px;
  }

  .status-action-btn {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 8px 16px;
    border: 1px solid var(--border);
    background: var(--deep);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }

  .status-action-btn:hover { border-color: var(--red); color: var(--cream); }
  .status-action-btn.btn-confirm  { border-color: var(--green); color: var(--green-bright); }
  .status-action-btn.btn-decline  { border-color: var(--border); color: var(--muted); }
  .status-action-btn.btn-complete { border-color: var(--muted); color: var(--cream); }
  .status-action-btn.btn-review   { border-color: var(--amber); color: var(--amber-bright); }

  /* ── CALENDAR ── */
  .calendar-wrapper {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 28px;
  }

  .cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  .cal-nav {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    width: 32px;
    height: 32px;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .cal-nav:hover { border-color: var(--red); color: var(--cream); }

  .cal-month {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--cream);
    letter-spacing: 0.1em;
  }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }

  .cal-day-name {
    font-family: 'Space Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    text-align: center;
    padding: 8px 0;
  }

  .cal-day {
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: all 0.15s;
    padding: 4px;
    min-height: 52px;
  }

  .cal-day:hover { border-color: var(--border); background: var(--surface2); }
  .cal-day.today { border-color: var(--red) !important; }
  .cal-day.empty { cursor: default; pointer-events: none; }

  .cal-day-num {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .cal-day.today .cal-day-num { color: var(--cream); }
  .cal-day.has-booking .cal-day-num { color: var(--cream); }

  .cal-dots {
    display: flex;
    gap: 2px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .cal-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--red-glow);
  }

  .cal-dot.confirmed { background: var(--green-bright); }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 60px 40px;
    color: var(--muted);
  }

  .empty-state p {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
  }

  /* ── LOADING ── */
  .loading {
    text-align: center;
    padding: 60px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: uppercase;
    animation: pulse 1.5s infinite;
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  @media (max-width: 768px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .charts-grid { grid-template-columns: 1fr; }
    .main { padding: 16px; }
    .modal-grid { grid-template-columns: 1fr; }
    .bookings-table th:nth-child(4),
    .bookings-table td:nth-child(4) { display: none; }
  }
</style>
</head>
<body>

<!-- ── LOGIN SCREEN ── -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">INKWELL</div>
    <div class="login-sub">Studio Dashboard</div>

    <div class="login-field">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="artist@studio.com" autocomplete="email">
    </div>
    <div class="login-field">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="login-btn" onclick="handleLogin()"><span>Enter Studio</span></button>
    <div class="login-error" id="loginError">Invalid email or password</div>
  </div>
</div>

<!-- ── DASHBOARD ── -->
<div id="dashboard">

  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">INKWELL</div>
      <div class="topbar-divider"></div>
      <div class="topbar-title">Studio Dashboard</div>
    </div>
    <div class="topbar-right">
      <button class="refresh-btn" onclick="loadBookings()">↻ Refresh</button>
      <button class="logout-btn" onclick="handleLogout()">Sign Out</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('overview')">Overview</button>
    <button class="tab" onclick="switchTab('bookings')">Bookings</button>
    <button class="tab" onclick="switchTab('calendar')">Calendar</button>
  </div>

  <!-- OVERVIEW TAB -->
  <div id="tab-overview" class="tab-content active">
    <div class="main">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">New Requests</div>
          <div class="stat-value red" id="statNew">—</div>
          <div class="stat-sub">Awaiting review</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Confirmed</div>
          <div class="stat-value green" id="statConfirmed">—</div>
          <div class="stat-sub">Upcoming sessions</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">This Month</div>
          <div class="stat-value amber" id="statMonth">—</div>
          <div class="stat-sub">Total requests</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Completed</div>
          <div class="stat-value" id="statCompleted">—</div>
          <div class="stat-sub">All time</div>
        </div>
      </div>

      <div class="charts-grid">
        <div class="chart-card">
          <div class="chart-title">Bookings per Month</div>
          <canvas id="chartMonthly" height="200"></canvas>
        </div>
        <div class="chart-card">
          <div class="chart-title">Status Breakdown</div>
          <canvas id="chartStatus" height="200"></canvas>
        </div>
      </div>

      <!-- Recent bookings preview -->
      <div class="table-header">
        <div class="table-title">Recent Requests</div>
      </div>
      <div id="recentBookings"></div>
    </div>
  </div>

  <!-- BOOKINGS TAB -->
  <div id="tab-bookings" class="tab-content">
    <div class="main">
      <div class="table-header">
        <div class="table-title">All Bookings</div>
        <div class="filters">
          <button class="filter-btn active" onclick="filterBookings('all', this)">All</button>
          <button class="filter-btn" onclick="filterBookings('new', this)">New</button>
          <button class="filter-btn" onclick="filterBookings('reviewed', this)">Reviewed</button>
          <button class="filter-btn" onclick="filterBookings('confirmed', this)">Confirmed</button>
          <button class="filter-btn" onclick="filterBookings('completed', this)">Completed</button>
          <button class="filter-btn" onclick="filterBookings('declined', this)">Declined</button>
        </div>
      </div>
      <div id="allBookings"></div>
    </div>
  </div>

  <!-- CALENDAR TAB -->
  <div id="tab-calendar" class="tab-content">
    <div class="main">
      <div class="calendar-wrapper">
        <div class="cal-header">
          <button class="cal-nav" onclick="changeMonth(-1)">&#8592;</button>
          <div class="cal-month" id="calMonth"></div>
          <button class="cal-nav" onclick="changeMonth(1)">&#8594;</button>
        </div>
        <div class="cal-grid" id="calGrid"></div>
      </div>
    </div>
  </div>

</div>

<!-- ── BOOKING DETAIL MODAL ── -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div>
        <div class="modal-name" id="modalName"></div>
        <div class="modal-ref" id="modalRef"></div>
      </div>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="status-actions" id="modalActions"></div>
  </div>
</div>

<script>
// ── CONFIG — replace with your actual values ─────────────────────
const SUPABASE_URL = 'YOUR_SUPABASE_URL';
const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
// ─────────────────────────────────────────────────────────────────

let allBookings = [];
let currentFilter = 'all';
let calendarDate = new Date();
let monthlyChart = null;
let statusChart = null;

// ── AUTH ─────────────────────────────────────────────────────────
async function handleLogin() {
  const email    = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errEl    = document.getElementById('loginError');
  errEl.style.display = 'none';

  const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY },
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  if (!res.ok || !data.access_token) {
    errEl.style.display = 'block';
    return;
  }

  sessionStorage.setItem('sb_token', data.access_token);
  showDashboard();
}

function handleLogout() {
  sessionStorage.removeItem('sb_token');
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
}

function getToken() { return sessionStorage.getItem('sb_token'); }

// Enter on password field
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('loginPassword')?.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
  });
  document.getElementById('loginEmail')?.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
  });
  // Auto-login if token exists
  if (getToken()) showDashboard();
});

function showDashboard() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  loadBookings();
}

// ── LOAD DATA ────────────────────────────────────────────────────
async function loadBookings() {
  const token = getToken();
  if (!token) return;

  const res = await fetch(`${SUPABASE_URL}/rest/v1/bookings?select=*&order=created_at.desc`, {
    headers: {
      'apikey':        SUPABASE_ANON_KEY,
      'Authorization': `Bearer ${token}`,
      'Content-Type':  'application/json'
    }
  });

  if (res.status === 401) { handleLogout(); return; }

  allBookings = await res.json();
  renderAll();
}

function renderAll() {
  renderStats();
  renderCharts();
  renderRecentBookings();
  renderAllBookings();
  renderCalendar();
}

// ── STATS ────────────────────────────────────────────────────────
function renderStats() {
  const now = new Date();
  const thisMonth = now.getMonth();
  const thisYear  = now.getFullYear();

  document.getElementById('statNew').textContent       = allBookings.filter(b => b.status === 'new').length;
  document.getElementById('statConfirmed').textContent = allBookings.filter(b => b.status === 'confirmed').length;
  document.getElementById('statCompleted').textContent = allBookings.filter(b => b.status === 'completed').length;
  document.getElementById('statMonth').textContent     = allBookings.filter(b => {
    const d = new Date(b.created_at);
    return d.getMonth() === thisMonth && d.getFullYear() === thisYear;
  }).length;
}

// ── CHARTS ───────────────────────────────────────────────────────
function renderCharts() {
  // Monthly bookings (last 6 months)
  const months = [];
  const counts = [];
  for (let i = 5; i >= 0; i--) {
    const d = new Date();
    d.setMonth(d.getMonth() - i);
    const label = d.toLocaleString('default', { month: 'short' });
    const count = allBookings.filter(b => {
      const bd = new Date(b.created_at);
      return bd.getMonth() === d.getMonth() && bd.getFullYear() === d.getFullYear();
    }).length;
    months.push(label);
    counts.push(count);
  }

  if (monthlyChart) monthlyChart.destroy();
  monthlyChart = new Chart(document.getElementById('chartMonthly'), {
    type: 'bar',
    data: {
      labels: months,
      datasets: [{ data: counts, backgroundColor: 'rgba(139,26,26,0.6)', borderColor: '#c0392b', borderWidth: 1 }]
    },
    options: {
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#7a6a60', font: { family: 'Space Mono', size: 9 } }, grid: { color: '#1c1717' } },
        y: { ticks: { color: '#7a6a60', font: { family: 'Space Mono', size: 9 }, stepSize: 1 }, grid: { color: '#1c1717' } }
      }
    }
  });

  // Status donut
  const statusCounts = ['new','reviewed','confirmed','declined','completed'].map(s => allBookings.filter(b => b.status === s).length);
  if (statusChart) statusChart.destroy();
  statusChart = new Chart(document.getElementById('chartStatus'), {
    type: 'doughnut',
    data: {
      labels: ['New', 'Reviewed', 'Confirmed', 'Declined', 'Completed'],
      datasets: [{ data: statusCounts, backgroundColor: ['#8b1a1a','#7a4f1a','#2d6a4f','#2a2020','#3d3530'], borderColor: '#131010', borderWidth: 2 }]
    },
    options: {
      plugins: { legend: { labels: { color: '#7a6a60', font: { family: 'Space Mono', size: 9 }, boxWidth: 12 } } },
      cutout: '65%'
    }
  });
}

// ── TABLES ───────────────────────────────────────────────────────
function renderRecentBookings() {
  const recent = allBookings.slice(0, 5);
  document.getElementById('recentBookings').innerHTML = buildTable(recent);
}

function filterBookings(status, btn) {
  currentFilter = status;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAllBookings();
}

function renderAllBookings() {
  const filtered = currentFilter === 'all' ? allBookings : allBookings.filter(b => b.status === currentFilter);
  document.getElementById('allBookings').innerHTML = buildTable(filtered);
}

function buildTable(bookings) {
  if (!bookings.length) return '<div class="empty-state"><p>No bookings found</p></div>';

  const rows = bookings.map(b => `
    <tr onclick="openModal('${b.id}')">
      <td><strong style="color:var(--cream)">${b.first_name} ${b.last_name}</strong></td>
      <td style="font-size:13px;">${b.email}</td>
      <td><span class="status-badge status-${b.status}">${b.status}</span></td>
      <td style="font-family:'Space Mono',monospace;font-size:11px;">${b.preferred_date1 || '—'}</td>
      <td style="font-family:'Space Mono',monospace;font-size:11px;color:var(--muted)">${formatDate(b.created_at)}</td>
    </tr>`).join('');

  return `
    <table class="bookings-table">
      <thead>
        <tr>
          <th>Client</th>
          <th>Email</th>
          <th>Status</th>
          <th>Preferred Date</th>
          <th>Submitted</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// ── MODAL ────────────────────────────────────────────────────────
function openModal(id) {
  const b = allBookings.find(x => x.id === id);
  if (!b) return;

  document.getElementById('modalName').textContent = `${b.first_name} ${b.last_name}`;
  document.getElementById('modalRef').textContent  = `Ref #${b.id.slice(0,8).toUpperCase()} · Submitted ${formatDate(b.created_at)}`;

  const placements = Array.isArray(b.placement) ? b.placement.join(', ') : (b.placement || '—');
  const fileNames  = Array.isArray(b.file_names) ? b.file_names : [];

  document.getElementById('modalBody').innerHTML = `
    <div class="modal-section">
      <div class="modal-section-title">Client</div>
      <div class="modal-grid">
        <div class="modal-field"><label>Email</label><p><a href="mailto:${b.email}" style="color:var(--red-glow)">${b.email}</a></p></div>
        <div class="modal-field"><label>Phone</label><p>${b.phone || '—'}</p></div>
        <div class="modal-field"><label>First Tattoo</label><p>${b.first_tattoo ? '✦ Yes' : 'No'}</p></div>
        <div class="modal-field"><label>Status</label><p><span class="status-badge status-${b.status}">${b.status}</span></p></div>
      </div>
    </div>

    <div class="modal-section">
      <div class="modal-section-title">Design</div>
      <div class="modal-grid">
        <div class="modal-field"><label>Placement</label><p>${placements}</p></div>
        <div class="modal-field"><label>Note</label><p>${b.placement_note || '—'}</p></div>
        <div class="modal-field"><label>Size</label><p>${b.size || '—'}</p></div>
        <div class="modal-field"><label>Budget</label><p>${b.budget ? '$' + b.budget : '—'}</p></div>
        <div class="modal-field full"><label>Description</label><div class="modal-description">${b.description}</div></div>
      </div>
    </div>

    <div class="modal-section">
      <div class="modal-section-title">Availability</div>
      <div class="modal-grid">
        <div class="modal-field"><label>Preferred Date 1</label><p>${b.preferred_date1 || '—'}</p></div>
        <div class="modal-field"><label>Preferred Date 2</label><p>${b.preferred_date2 || '—'}</p></div>
        <div class="modal-field"><label>Time of Day</label><p>${b.time_of_day || '—'}</p></div>
      </div>
    </div>

    ${fileNames.length ? `
    <div class="modal-section">
      <div class="modal-section-title">Reference Images</div>
      <div class="modal-files">
        ${fileNames.map(name => `<a class="modal-file-link" href="#" onclick="fetchSignedUrl('${b.id}', '${name}', event)">↗ ${name}</a>`).join('')}
      </div>
    </div>` : ''}`;

  document.getElementById('modalActions').innerHTML = `
    <span>Mark as:</span>
    ${b.status !== 'reviewed'  ? `<button class="status-action-btn btn-review"   onclick="updateStatus('${b.id}', 'reviewed')">Reviewed</button>`   : ''}
    ${b.status !== 'confirmed' ? `<button class="status-action-btn btn-confirm"  onclick="updateStatus('${b.id}', 'confirmed')">Confirmed</button>`  : ''}
    ${b.status !== 'declined'  ? `<button class="status-action-btn btn-decline"  onclick="updateStatus('${b.id}', 'declined')">Declined</button>`   : ''}
    ${b.status !== 'completed' ? `<button class="status-action-btn btn-complete" onclick="updateStatus('${b.id}', 'completed')">Completed</button>` : ''}`;

  document.getElementById('modalOverlay').classList.add('show');
}

async function fetchSignedUrl(bookingId, fileName, e) {
  e.preventDefault();
  const link = e.currentTarget;
  link.textContent = '⟳ Loading...';

  const res = await fetch('/api/signed-url', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getToken()}` },
    body: JSON.stringify({ fileName })
  });

  const data = await res.json();
  if (data.url) window.open(data.url, '_blank');
  else link.textContent = '✕ Could not load';
  link.textContent = `↗ ${fileName}`;
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
}

function closeModalDirect() {
  document.getElementById('modalOverlay').classList.remove('show');
}

// ── UPDATE STATUS ────────────────────────────────────────────────
async function updateStatus(id, status) {
  const token = getToken();
  await fetch(`${SUPABASE_URL}/rest/v1/bookings?id=eq.${id}`, {
    method: 'PATCH',
    headers: {
      'apikey':        SUPABASE_ANON_KEY,
      'Authorization': `Bearer ${token}`,
      'Content-Type':  'application/json',
      'Prefer':        'return=minimal'
    },
    body: JSON.stringify({ status })
  });

  closeModalDirect();
  await loadBookings();
}

// ── CALENDAR ────────────────────────────────────────────────────
function renderCalendar() {
  const year  = calendarDate.getFullYear();
  const month = calendarDate.getMonth();

  document.getElementById('calMonth').textContent =
    calendarDate.toLocaleString('default', { month: 'long', year: 'numeric' }).toUpperCase();

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  dayNames.forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-day-name';
    el.textContent = d;
    grid.appendChild(el);
  });

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const today = new Date();

  for (let i = 0; i < firstDay; i++) {
    const empty = document.createElement('div');
    empty.className = 'cal-day empty';
    grid.appendChild(empty);
  }

  for (let day = 1; day <= daysInMonth; day++) {
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const dayBookings = allBookings.filter(b => b.preferred_date1 === dateStr || b.preferred_date2 === dateStr);
    const isToday = today.getDate() === day && today.getMonth() === month && today.getFullYear() === year;

    const el = document.createElement('div');
    el.className = 'cal-day' + (isToday ? ' today' : '') + (dayBookings.length ? ' has-booking' : '');

    const num = document.createElement('div');
    num.className = 'cal-day-num';
    num.textContent = day;
    el.appendChild(num);

    if (dayBookings.length) {
      const dots = document.createElement('div');
      dots.className = 'cal-dots';
      dayBookings.slice(0,4).forEach(b => {
        const dot = document.createElement('div');
        dot.className = 'cal-dot' + (b.status === 'confirmed' ? ' confirmed' : '');
        dots.appendChild(dot);
      });
      el.appendChild(dots);
      el.onclick = () => openModal(dayBookings[0].id);
    }

    grid.appendChild(el);
  }
}

function changeMonth(dir) {
  calendarDate.setMonth(calendarDate.getMonth() + dir);
  renderCalendar();
}

// ── TABS ─────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    const names = ['overview','bookings','calendar'];
    t.classList.toggle('active', names[i] === name);
  });
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById(`tab-${name}`).classList.add('active');
}

// ── UTILS ────────────────────────────────────────────────────────
function formatDate(str) {
  if (!str) return '—';
  return new Date(str).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}
</script>
</body>
</html>
